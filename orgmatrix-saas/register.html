<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Restricted - OrgMatrix</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="login-container">
  <div class="login-box" style="text-align: center;">
    <div class="brand-wrapper" aria-label="Brand animation">
      <h1 id="brand" class="brand" data-text="ORGMATRIX">ORGMATRIX</h1>
    </div>

    <div style="margin: 40px 0; padding: 20px; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px;">
      <h2 style="color: #ef4444; margin-bottom: 12px;">Registration Restricted</h2>
      <p style="color: #64748b; line-height: 1.6;">
        Public registration is currently disabled for this platform. 
        Only pre-authorized emails and stored tenant members can access the system.
      </p>
    </div>

    <a href="login.html" class="button-primary" style="display: inline-block; text-decoration: none; background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600;">Return to Login</a>
  </div>
</div>

</body>
</html>
